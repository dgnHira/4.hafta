<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiranur Doğan - Proje Portalı</title>
    <style>
        /* Genel Arka Plan ve Yazı Tipleri */
        body {
            background-color: #0b0118; /* Koyu mor/siyah */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Işıltılı Profil Resmi */
        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #7b61ff;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(123, 97, 255, 0.7); /* Mor parlama */
        }

        /* Simli/Gradyan Başlık */
        h1 {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(90deg, #a0feff, #e33fa1, #a0feff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            font-weight: 900;
        }

        .tagline {
            color: #7b61ff;
            letter-spacing: 4px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 40px;
        }

        /* HAREKETLİ SİMLİ BUTON */
        .btn-main {
            background: linear-gradient(90deg, #7b61ff, #e33fa1, #7b61ff);
            background-size: 200% auto;
            color: white;
            padding: 18px 50px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(227, 63, 161, 0.5);
            transition: 0.4s;
            animation: glitter 3s linear infinite;
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 0 40px rgba(227, 63, 161, 0.9);
        }

        /* Alt Linkler (Küçük Butonlar) */
        .links-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            font-weight: 500;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #7b61ff;
            box-shadow: 0 0 15px rgba(123, 97, 255, 0.4);
        }

        /* Animasyonlar */
        @keyframes glitter {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <img src="profil.jpeg" alt="Hiranur Doğan" class="profile-img">

    <div class="tagline">✦ HİRANUR DOĞAN ✦</div>

    <h1>VBA-GBT</h1>
    <p class="subtitle">İnteraktif araçlar, görsel araştırmalar & deneyimler</p>

    <a href="gezi.rehberi.html" class="btn-main">Renk Dünyasına Gir →</a>

    <div class="links-container">
        <a href="data.csv" class="link-item">📂 Veri Seti (CSV)</a>
        <a href="scatter_plot.png" class="link-item">📊 Grafik</a>
    </div>

</body>
</html>
