<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiranur Doğan - Portfolyo</title>
    <style>
        /* ARKA PLAN VE GENEL YAPI */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Türkiye Kolajı Arka Planı */
            background: url('https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?q=80&w=2000') center/cover no-repeat;
        }

        /* CAM EFEKTİ PANEL (GLASSMORPHISM) */
        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            width: 85%;
            max-width: 750px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        /* PARLAYAN RENKLİ PROFİL ÇERÇEVESİ */
        .profile-ring {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            padding: 6px;
            background: linear-gradient(45deg, #00f2ff, #ff00ea, #fbff00, #00f2ff);
            background-size: 400%;
            border-radius: 50%;
            animation: glowRotate 5s linear infinite;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
        }

        .profile-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #111;
        }

        /* NEON İSİM VE BAŞLIK */
        h1 {
            font-size: 4rem;
            margin: 0;
            color: #00f2ff;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -2px;
        }

        h1 span {
            color: #ff00ea;
        }

        .desc {
            color: #fff;
            font-size: 1.1rem;
            margin-top: 10px;
            margin-bottom: 40px;
            opacity: 0.9;
            font-weight: 300;
        }

        /* SİMLİ ANA BUTON */
        .main-btn {
            background: linear-gradient(90deg, #b8ffb8, #00d4ff, #ff00ea, #b8ffb8);
            background-size: 300% auto;
            color: #000;
            padding: 20px 60px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.8rem;
            display: inline-block;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
            border: 2px solid #fff;
            animation: shimmer 3s infinite;
            transition: 0.3s;
        }

        .main-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 0, 234, 0.7);
        }

        /* ALT LİNKLER */
        .bottom-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sub-link {
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid transparent;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sub-link.g { border-color: #ff00ea; box-shadow: 0 0 15px #ff00ea; }
        .sub-link.d { border-color: #00f2ff; box-shadow: 0 0 15px #00f2ff; }
        .sub-link.c { border-color: #fbff00; box-shadow: 0 0 15px #fbff00; }

        .sub-link:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-5px); }

        /* ANİMASYONLAR */
        @keyframes glowRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes shimmer {
            to { background-position: 300% center; }
        }

        /* SİMLİ FARE EFEKTİ CANVAS */
        #trail {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <canvas id="trail"></canvas>

    <div class="glass-box">
        <div class="profile-ring">
            <img src="profil.jpeg" alt="Hiranur Doğan">
        </div>

        <h1>HİRANUR <span>DOĞAN</span></h1>
        
        <p class="desc">Türkiye'nin En Renkli Gezi Portalı, Grafikleri ve Verileri</p>

        <a href="gezi.rehberi.html" class="main-btn">GEZİ REHBERİ</a>

        <div class="bottom-links">
            <a href="scatter_plot.png" class="sub-link g">📊 Grafikler</a>
            <a href="sicaklik_hist.png" class="sub-link d">📈 Data</a>
            <a href="data.csv" class="sub-link c">📂 Veri Seti (CSV)</a>
        </div>
    </div>

    <script>
        // SİMLİ FARE TAKİP SCRIPTİ
        const canvas = document.getElementById('trail');
        const ctx = canvas.getContext('2d');
        let dots = [];

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<8; i++) {
                dots.push({
                    x: e.clientX,
                    y: e.clientY,
                    s: Math.random() * 3 + 1,
                    c: `hsl(${Math.random() * 360}, 100%, 75%)`,
                    vx: Math.random() * 2 - 1,
                    vy: Math.random() * 2 - 1,
                    a: 1
                });
            }
        });

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach((d, i) => {
                d.x += d.vx; d.y += d.vy;
                d.a -= 0.02;
                ctx.globalAlpha = d.a;
                ctx.fillStyle = d.c;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.s, 0, Math.PI * 2);
                ctx.fill();
                if(d.a <= 0) dots.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
