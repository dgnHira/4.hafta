<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiranur Doğan - Renkli Gezi Portalı</title>
    <style>
        /* GENEL AYARLAR VE ARKA PLAN KOLAJI */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Türkiye Kolajı Arka Planı */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?q=80&w=2000');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* CAM EFEKTİ PANEL (GLASSMORPHISM) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 10;
        }

        /* IŞILTILI PROFİL RESMİ */
        .profile-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            padding: 5px;
            background: linear-gradient(45deg, #00f2ff, #ff00ea, #fbff00);
            border-radius: 50%;
            animation: rotateGlow 3s linear infinite;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #000;
        }

        /* CANLI BAŞLIKLAR */
        h1 {
            font-size: 3.5rem;
            margin: 0;
            color: white;
            text-shadow: 0 0 10px rgba(0,242,255,0.8);
            font-weight: 800;
        }

        h1 span {
            color: #ff00ea;
            text-shadow: 0 0 10px rgba(255,0,234,0.8);
        }

        .subtitle {
            color: #ddd;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* GEZİ REHBERİ BUTONU (ANA BUTON) */
        .main-btn {
            background: linear-gradient(90deg, #b8ffb8, #00d4ff, #b8ffb8);
            background-size: 200% auto;
            color: #000;
            padding: 15px 40px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.8rem;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 0 20px #00d4ff;
            animation: glitterMove 3s linear infinite;
            border: 2px solid white;
        }

        /* ALT LİNKLER (GRAFİK, DATA, CSV) */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .sub-btn {
            padding: 10px 25px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border: 2px solid transparent;
            background-clip: padding-box;
            transition: 0.3s;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-btn.grafik { border-color: #ff00ea; box-shadow: 0 0 10px #ff00ea; }
        .sub-btn.data { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        .sub-btn.csv { border-color: #fbff00; box-shadow: 0 0 10px #fbff00; }

        .sub-btn:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }

        /* ANİMASYONLAR */
        @keyframes rotateGlow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        @keyframes glitterMove {
            to { background-position: 200% center; }
        }

        /* SİMLİ FARE TAKİBİ */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="glass-panel">
        <div class="profile-wrapper">
            <img src="profil.jpeg" alt="Hiranur" class="profile-img">
        </div>

        <h1>HİRANUR <span>DOĞAN</span></h1>
        <p class="subtitle">Türkiye'nin En Renkli Gezi Portalı, Grafikleri ve Verileri</p>

        <a href="gezi.rehberi.html" class="main-btn">GEZİ REHBERİ</a>

        <div class="button-group">
            <a href="scatter_plot.png" class="sub-btn grafik">📊 Grafikler</a>
            <a href="sicaklik_hist.png" class="sub-btn data">📈 Data</a>
            <a href="data.csv" class="sub-btn csv">📂 Veri Seti (CSV)</a>
        </div>
    </div>

    <script>
        // SİMLİ FARE TAKİP SCRIPTİ
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<8; i++) {
                particles.push({
                    x: e.x, y: e.y,
                    size: Math.random() * 4 + 1,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    speedX: Math.random() * 2 - 1,
                    speedY: Math.random() * 2 - 1,
                    alpha: 1
                });
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.speedX; p.y += p.speedY;
                p.alpha -= 0.015;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if(p.alpha <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
